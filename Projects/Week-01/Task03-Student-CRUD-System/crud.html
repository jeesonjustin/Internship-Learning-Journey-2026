<!DOCTYPE html>
<html>

<head>
    <title>CRUD-Student Registration Form</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        input[type="radio"] {
            margin-right: 5px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: #07883a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #05ad45;
        }

        .error {
            border: 2px solid red !important;
        }

        .success {
            border: 2px solid green !important;
        }

        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 3px;
            display: block;
        }

        .action-btn {
            width: auto;
            padding: 6px 10px;
            margin: 2px;
            display: inline-block;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0066ff;
            color: white;

        }

        .edit-btn {
            background: orange;
        }

        .delete-btn {
            background: red;
        }
    </style>
</head>


<body>

    <div class="container">

        <h2>Student Registration Form</h2>
        <p id="message" style="color:green;text-align:center;font-weight:bold;">
        </p>
        <form onsubmit="return validateForm();">

            <label>Full Name:</label>
            <input type="text" id="name" onblur="validateName()">
            <span id="nameError" class="error-message"></span>

            <label>Email Address:</label>
            <input type="email" id="email" onblur="validateEmail()">
            <span id="emailError" class="error-message"></span>

            <label>Mobile Number:</label>
            <input type="text" id="mobile" onblur="validateMobile()">
            <span id="mobileError" class="error-message"></span>

            <label>Date of Birth:</label>
            <input type="date" id="dob" onblur="validateDOB()">
            <span id="dobError" class="error-message"></span>

            <label>Gender:</label>

            <input type="radio" name="gender" value="Male" onclick="validateGender()"> Male

            <input type="radio" name="gender" value="Female" onclick="validateGender()"> Female

            <span id="genderError" class="error-message"></span>

            <label>Course:</label>

            <select id="course" onchange="validateCourse()">
                <option value="">Select Course</option>
                <option>MCA</option>
                <option>BCA</option>
                <option>B.Tech</option>
                <option>M.Tech</option>
            </select>

            <span id="courseError" class="error-message"></span>

            <label>Address:</label>

            <textarea id="address" onblur="validateAddress()"></textarea>

            <span id="addressError" class="error-message"></span>

            <button type="submit">Register</button>
            <button type="button" onclick="clearForm()" style="background:#666;">
                Clear Form
            </button>
        </form>


    </div>
    <h3 id="studentHeading" style="display:none;">
        Registered Students
    </h3>
    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable">
        </tbody>
    </table>
    <script>

        let editRow = null;

        function setError(id, message) {

            document.getElementById(id).classList.add("error");
            document.getElementById(id).classList.remove("success");
            document.getElementById(id + "Error").innerHTML = message;

            return false;
        }

        function setSuccess(id) {

            document.getElementById(id).classList.remove("error");
            document.getElementById(id).classList.add("success");
            document.getElementById(id + "Error").innerHTML = "";

            return true;
        }

        function validateName() {

            let name = document.getElementById("name").value.trim();

            if (name === "") {
                return setError("name", "Name is required");
            }

            if (name.length < 3) {
                return setError("name", "Minimum 3 characters required");
            }

            return setSuccess("name");
        }

        function validateEmail() {

            let email = document.getElementById("email").value.trim();

            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email === "") {
                return setError("email", "Email is required");
            }

            if (!emailPattern.test(email)) {
                return setError("email", "Invalid email format");
            }

            return setSuccess("email");
        }

        function validateMobile() {

            let mobile = document.getElementById("mobile").value.trim();

            let mobilePattern = /^[6-9][0-9]{9}$/;

            if (mobile === "") {
                return setError("mobile", "Mobile number is required");
            }

            if (!mobilePattern.test(mobile)) {
                return setError(
                    "mobile",
                    "Enter valid 10 digit mobile number"
                );
            }

            return setSuccess("mobile");
        }

        function validateDOB() {

            let dob = document.getElementById("dob").value;

            if (dob === "") {

                document.getElementById("dob").classList.add("error");
                document.getElementById("dob").classList.remove("success");

                document.getElementById("dobError").innerHTML =
                    "Please select date of birth";

                return false;
            }

            let selectedDate = new Date(dob);
            let today = new Date();

            today.setHours(0, 0, 0, 0);

            if (selectedDate > today) {

                document.getElementById("dob").classList.add("error");
                document.getElementById("dob").classList.remove("success");

                document.getElementById("dobError").innerHTML =
                    "Invalid Date of Birth: cannot be a future date";

                return false;
            }

            document.getElementById("dob").classList.remove("error");
            document.getElementById("dob").classList.add("success");

            document.getElementById("dobError").innerHTML = "";

            return true;
        }

        function validateGender() {

            let gender =
                document.querySelector(
                    'input[name="gender"]:checked'
                );

            if (!gender) {

                document.getElementById("genderError").innerHTML =
                    "Please select gender";

                return false;
            }

            document.getElementById("genderError").innerHTML = "";

            return true;
        }

        function validateCourse() {

            let course =
                document.getElementById("course").value;

            if (course === "") {
                return setError(
                    "course",
                    "Please select course"
                );
            }

            return setSuccess("course");
        }

        function validateAddress() {

            let address =
                document.getElementById("address")
                    .value.trim();

            if (address === "") {

                return setError(
                    "address",
                    "Address is required"
                );
            }

            if (address.length < 10) {

                return setError(
                    "address",
                    "Address must contain at least 10 characters"
                );
            }

            return setSuccess("address");
        }

        function validateForm() {

            let isValid = true;

            isValid = validateName() && isValid;
            isValid = validateEmail() && isValid;
            isValid = validateMobile() && isValid;
            isValid = validateDOB() && isValid;
            isValid = validateGender() && isValid;
            isValid = validateCourse() && isValid;
            isValid = validateAddress() && isValid;

            if (!isValid) {
                return false;
            }

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let mobile = document.getElementById("mobile").value;
            let dob = document.getElementById("dob").value;

            let gender =
                document.querySelector(
                    'input[name="gender"]:checked'
                ).value;

            let course =
                document.getElementById("course").value;

            let address =
                document.getElementById("address").value;

            let table =
                document.querySelector("table");

            let heading =
                document.getElementById("studentHeading");

            table.style.display = "table";
            heading.style.display = "block";

            if (editRow != null) {

                editRow.cells[1].innerHTML = name;
                editRow.cells[2].innerHTML = email;
                editRow.cells[3].innerHTML = mobile;
                editRow.cells[4].innerHTML = course;

                editRow.dataset.dob = dob;
                editRow.dataset.gender = gender;
                editRow.dataset.address = address;

                showMessage("Student Updated Successfully!");

                editRow = null;
            }
            else {

                let tbody =
                    document.getElementById("studentTable");

                let row = tbody.insertRow();

                row.insertCell(0).innerHTML =
                    tbody.rows.length;

                row.insertCell(1).innerHTML = name;
                row.insertCell(2).innerHTML = email;
                row.insertCell(3).innerHTML = mobile;
                row.insertCell(4).innerHTML = course;

                row.dataset.dob = dob;
                row.dataset.gender = gender;
                row.dataset.address = address;

                row.insertCell(5).innerHTML =
                    `<button type="button"
                class="action-btn edit-btn"
                onclick="editStudent(this)">
                Edit
            </button>

            <button type="button"
                class="action-btn delete-btn"
                onclick="deleteStudent(this)">
                Delete
            </button>`;

                showMessage("Registration Successful!");
            }

            document.querySelector("form").reset();

            document.querySelectorAll(".success")
                .forEach(element => {
                    element.classList.remove("success");
                });

            return false;
        }

        function editStudent(button) {

            let row =
                button.parentNode.parentNode;

            document.getElementById("name").value =
                row.cells[1].innerHTML;

            document.getElementById("email").value =
                row.cells[2].innerHTML;

            document.getElementById("mobile").value =
                row.cells[3].innerHTML;

            document.getElementById("course").value =
                row.cells[4].innerHTML;

            document.getElementById("dob").value =
                row.dataset.dob;

            document.getElementById("address").value =
                row.dataset.address;

            let gender =
                row.dataset.gender;

            document.querySelectorAll(
                'input[name="gender"]'
            ).forEach(function (radio) {

                radio.checked =
                    radio.value === gender;
            });

            editRow = row;

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        function deleteStudent(button) {

            if (!confirm("Are you sure to delete?")) {
                return;
            }

            let row = button.parentNode.parentNode;

            row.remove();

            let rows =
                document.querySelectorAll(
                    "#studentTable tr"
                );

            rows.forEach((row, index) => {
                row.cells[0].innerHTML = index + 1;
            });

            if (rows.length === 0) {

                document.querySelector("table").style.display =
                    "none";

                document.getElementById(
                    "studentHeading"
                ).style.display = "none";
            }

            showMessage("Student Deleted Successfully!", "red");
        }
        function clearForm() {

            document.querySelector("form").reset();

            document.querySelectorAll(".error")
                .forEach(function (element) {

                    element.classList.remove("error");
                });

            document.querySelectorAll(".success")
                .forEach(function (element) {

                    element.classList.remove("success");
                });

            document.querySelectorAll(".error-message")
                .forEach(function (element) {

                    element.innerHTML = "";
                });

            document.querySelectorAll(
                'input[name="gender"]'
            ).forEach(function (radio) {

                radio.checked = false;
            });

            showMessage("Form Cleared", "blue");

            editRow = null;
        }
        function showMessage(message, color = "green") {

            let msg = document.getElementById("message");

            msg.innerHTML = message;
            msg.style.color = color;

            setTimeout(() => {
                msg.innerHTML = "";
            }, 3000); // 3 seconds
        }
    </script>
</body>

</html>
